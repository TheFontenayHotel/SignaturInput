<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signatur Banner Upload</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .corner-btn {
      position: fixed;
      top: 16px;
      z-index: 100;
      font-size: 0.8rem;
    }
    .logout-btn {
      left: 16px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 6px 16px;
      color: #666;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      text-decoration: none;
    }
    .logout-btn:hover { background: #f5f5f5; color: #333; }
    .lang-toggle {
      right: 16px;
      display: flex;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .lang-toggle button {
      border: none;
      background: transparent;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 600;
      color: #888;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .lang-toggle button.active {
      background: #1976d2;
      color: #fff;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 620px;
      width: 100%;
      padding: 36px;
    }
    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    .disclaimer {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-left: 4px solid #ffa000;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .disclaimer h2 {
      font-size: 0.95rem;
      color: #e65100;
      margin-bottom: 10px;
    }
    .disclaimer ul {
      list-style: none;
      padding: 0;
    }
    .disclaimer li {
      padding: 4px 0;
      font-size: 0.9rem;
      color: #333;
    }
    .disclaimer li::before {
      content: "\2022";
      color: #ffa000;
      font-weight: bold;
      display: inline-block;
      width: 16px;
    }
    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 16px;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #1976d2;
      background: #e3f2fd;
    }
    .upload-area p {
      color: #888;
      font-size: 0.95rem;
    }
    .upload-area input[type="file"] {
      display: none;
    }
    .preview-container {
      display: none;
      margin-bottom: 16px;
      text-align: center;
    }
    .preview-container img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
    }
    .preview-info {
      font-size: 0.85rem;
      color: #666;
      margin-top: 8px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover:not(:disabled) {
      background: #1565c0;
    }
    .btn:disabled {
      background: #bbb;
      cursor: not-allowed;
    }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }
    .status.success {
      display: block;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      color: #2e7d32;
    }
    .status.error {
      display: block;
      background: #fbe9e7;
      border: 1px solid #ef9a9a;
      color: #c62828;
    }
    .status.loading {
      display: block;
      background: #e3f2fd;
      border: 1px solid #90caf9;
      color: #1565c0;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #1565c0;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .validation-error {
      color: #c62828;
      font-size: 0.85rem;
      margin-top: 8px;
    }
    .url-input-group {
      margin-bottom: 16px;
    }
    .url-input-group label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .url-input-group .optional {
      font-weight: 400;
      color: #999;
      font-size: 0.85rem;
    }
    .url-input-group input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .url-input-group input[type="url"]:focus {
      outline: none;
      border-color: #1976d2;
      box-shadow: 0 0 0 2px rgba(25,118,210,0.15);
    }
    .url-hint {
      font-size: 0.82rem;
      color: #888;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <a href="/logout" class="corner-btn logout-btn" data-i18n="logout"></a>

  <div class="corner-btn lang-toggle">
    <button id="langDe" class="active" onclick="setLang('de')">DE</button>
    <button id="langEn" onclick="setLang('en')">EN</button>
  </div>

  <div class="card">
    <h1 data-i18n="title"></h1>
    <p class="subtitle" data-i18n="subtitle"></p>

    <div class="disclaimer">
      <h2 data-i18n="reqTitle"></h2>
      <ul>
        <li><strong data-i18n="reqFormatLabel"></strong> <span data-i18n="reqFormat"></span></li>
        <li><strong data-i18n="reqSizeLabel"></strong> <span data-i18n="reqSize"></span></li>
      </ul>
    </div>

    <div class="upload-area" id="dropZone">
      <p data-i18n="dropText"></p>
      <input type="file" id="fileInput" accept="image/png">
    </div>

    <div class="validation-error" id="validationError"></div>

    <div class="preview-container" id="previewContainer">
      <img id="previewImage" alt="Preview">
      <p class="preview-info" id="previewInfo"></p>
    </div>

    <div class="url-input-group">
      <label for="bannerUrl"><span data-i18n="urlLabel"></span> <span class="optional" data-i18n="urlOptional"></span></label>
      <input type="url" id="bannerUrl" placeholder="https://www.thefontenay.com/..." maxlength="2048">
      <p class="url-hint" data-i18n="urlHint"></p>
      <div class="validation-error" id="urlValidationError"></div>
    </div>

    <button class="btn" id="uploadBtn" disabled data-i18n="uploadBtn"></button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const T = {
      de: {
        title: 'Signatur Banner Upload',
        subtitle: 'Laden Sie ein neues Bannerbild f\u00FCr die E-Mail-Signatur der Marketingabteilung hoch.',
        reqTitle: 'Bildanforderungen',
        reqFormatLabel: 'Format:',
        reqFormat: 'Nur PNG',
        reqSizeLabel: 'Max. Dateigr\u00F6\u00DFe:',
        reqSize: '10 MB',
        dropText: 'Klicken Sie, um eine PNG-Datei auszuw\u00E4hlen, oder ziehen Sie sie hierher',
        urlLabel: 'Banner-Link-URL',
        urlOptional: '(optional)',
        urlHint: 'Die URL, die beim Klicken auf das Banner in der E-Mail-Signatur ge\u00F6ffnet wird. Leer lassen, um den aktuellen Link beizubehalten.',
        uploadBtn: 'Banner hochladen',
        logout: 'Abmelden',
        errPngOnly: 'Nur PNG-Dateien werden akzeptiert.',
        errTooLarge: 'Datei ist zu gro\u00DF ({size} MB). Maximal 10 MB.',
        errInvalidPng: 'Bild konnte nicht gelesen werden. Stellen Sie sicher, dass es eine g\u00FCltige PNG-Datei ist.',
        errUrlHttps: 'URL muss HTTPS verwenden.',
        errUrlTooLong: 'URL ist zu lang (max. 2048 Zeichen).',
        errUrlInvalid: 'Bitte geben Sie eine g\u00FCltige URL ein (z.\u00A0B. https://www.thefontenay.com/...).',
        statusUploading: 'Wird hochgeladen und \u00FCbertragen\u2026',
        statusNetError: 'Netzwerkfehler. Bitte pr\u00FCfen Sie Ihre Verbindung und versuchen Sie es erneut.',
        statusUploadFail: 'Upload fehlgeschlagen. Bitte versuchen Sie es erneut.'
      },
      en: {
        title: 'Signature Banner Upload',
        subtitle: 'Upload a new banner image for the Marketing Department email signature.',
        reqTitle: 'Image Requirements',
        reqFormatLabel: 'Format:',
        reqFormat: 'PNG only',
        reqSizeLabel: 'Max file size:',
        reqSize: '10 MB',
        dropText: 'Click to select a PNG file or drag & drop it here',
        urlLabel: 'Banner Link URL',
        urlOptional: '(optional)',
        urlHint: 'The URL opened when clicking the banner in email signatures. Leave empty to keep the current link.',
        uploadBtn: 'Upload Banner',
        logout: 'Logout',
        errPngOnly: 'Only PNG files are accepted.',
        errTooLarge: 'File is too large ({size} MB). Maximum is 10 MB.',
        errInvalidPng: 'Could not read image. Ensure it is a valid PNG.',
        errUrlHttps: 'URL must use HTTPS.',
        errUrlTooLong: 'URL is too long (max 2048 characters).',
        errUrlInvalid: 'Please enter a valid URL (e.g., https://www.thefontenay.com/...).',
        statusUploading: 'Uploading and transferring\u2026',
        statusNetError: 'Network error. Please check your connection and try again.',
        statusUploadFail: 'Upload failed. Please try again.'
      }
    };

    let currentLang = localStorage.getItem('lang') || 'de';

    function t(key, replacements) {
      let str = T[currentLang][key] || T.de[key] || key;
      if (replacements) {
        for (const [k, v] of Object.entries(replacements)) {
          str = str.replace('{' + k + '}', v);
        }
      }
      return str;
    }

    function applyLang(lang) {
      currentLang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (T[lang][key]) el.textContent = T[lang][key];
      });
      document.getElementById('langDe').classList.toggle('active', lang === 'de');
      document.getElementById('langEn').classList.toggle('active', lang === 'en');
      document.title = T[lang].title;
    }

    function setLang(lang) {
      localStorage.setItem('lang', lang);
      applyLang(lang);
    }

    // DOM references
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const previewContainer = document.getElementById('previewContainer');
    const previewImage = document.getElementById('previewImage');
    const previewInfo = document.getElementById('previewInfo');
    const statusEl = document.getElementById('status');
    const validationError = document.getElementById('validationError');
    const bannerUrlInput = document.getElementById('bannerUrl');
    const urlValidationError = document.getElementById('urlValidationError');

    const MAX_SIZE = 10 * 1024 * 1024;

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        handleFile(fileInput.files[0]);
      }
    });

    function handleFile(file) {
      selectedFile = null;
      uploadBtn.disabled = true;
      previewContainer.style.display = 'none';
      validationError.textContent = '';
      statusEl.className = 'status';
      statusEl.style.display = 'none';

      if (!file.name.toLowerCase().endsWith('.png') || file.type !== 'image/png') {
        validationError.textContent = t('errPngOnly');
        return;
      }

      if (file.size > MAX_SIZE) {
        validationError.textContent = t('errTooLarge', { size: (file.size / 1024 / 1024).toFixed(1) });
        return;
      }

      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        URL.revokeObjectURL(url);
        selectedFile = file;
        previewImage.src = URL.createObjectURL(file);
        previewInfo.textContent = `${img.naturalWidth} \u00D7 ${img.naturalHeight} px \u2014 ${(file.size / 1024).toFixed(0)} KB`;
        previewContainer.style.display = 'block';
        uploadBtn.disabled = false;
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        validationError.textContent = t('errInvalidPng');
      };
      img.src = url;
    }

    function validateBannerUrl(value) {
      if (!value) return null;
      try {
        const url = new URL(value);
        if (url.protocol !== 'https:') return t('errUrlHttps');
        if (value.length > 2048) return t('errUrlTooLong');
        return null;
      } catch {
        return t('errUrlInvalid');
      }
    }

    bannerUrlInput.addEventListener('input', () => {
      const err = validateBannerUrl(bannerUrlInput.value.trim());
      urlValidationError.textContent = err || '';
    });

    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      const urlValue = bannerUrlInput.value.trim();
      const urlErr = validateBannerUrl(urlValue);
      if (urlErr) {
        urlValidationError.textContent = urlErr;
        return;
      }

      uploadBtn.disabled = true;
      statusEl.className = 'status loading';
      statusEl.innerHTML = '<span class="spinner"></span> ' + t('statusUploading');
      statusEl.style.display = 'block';

      const formData = new FormData();
      formData.append('banner', selectedFile);
      if (urlValue) formData.append('bannerUrl', urlValue);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok && data.success) {
          statusEl.className = 'status success';
          statusEl.textContent = data.message;
          selectedFile = null;
          previewContainer.style.display = 'none';
          fileInput.value = '';
          bannerUrlInput.value = '';
        } else {
          statusEl.className = 'status error';
          statusEl.textContent = data.error || t('statusUploadFail');
          uploadBtn.disabled = false;
        }
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = t('statusNetError');
        uploadBtn.disabled = false;
      }
    });

    // Apply saved language on load
    applyLang(currentLang);
  </script>
</body>
</html>
